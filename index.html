<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knockout Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 600px; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1rem; }
    p { font-size: 1.1rem; color: #aaa; line-height: 1.6; margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }
    a.contact {
      color: #f0f0f0;
      text-decoration: none;
      border-bottom: 1px solid #555;
    }
    footer { margin-top: 4rem; font-size: 0.8rem; color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Knockout Apps</h1>
    <p>We build focused, thoughtful mobile apps for iOS.</p>
    <div class="badge">Atlanta, GA · knockout-apps.com</div>
    <p>
      Get in touch: <a class="contact" href="mailto:joe@knockout-apps.com">joe@knockout-apps.com</a>
    </p>
  </div>
  <footer>&copy; 2026 Knockout Apps LLC</footer>
</body>
</html>
